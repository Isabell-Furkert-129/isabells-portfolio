      I am a Digital Linguistics student and student researcher at the Department of Knowledge Technologies at [JSI](https://kt.ijs.si/) in Ljubljana, where I focus on the intersection of language, politics and technology.

      I am involved in projects such as ParlaMint, CLASSLA-web and ParlaSpeech, and I have a strong background in corpus linguistics.

      📹 I also create educational content — check out my [tutorial videos on ParlaSpeech & CLASSLA-web](https://video.arnes.si/?channel=v8585yrdxhxl).

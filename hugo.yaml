    items:
      - title: "German Songs CEFR Analysis"
        content: A corpus linguistics pipeline for classifying German song lyrics by CEFR proficiency levels (A1, A2, B1). Includes web scraping, NLP preprocessing with spaCy, CEFR lexicon construction, and genre-based analysis of ~2000 songs.
        image: /images/projects/profile.png
        featured:
          name: GitHub
          link: https://github.com/Isabell-Furkert-129/german_songs_CEFR_analysis
        badges:
          - "Python"
          - "spaCy"
          - "Corpus Linguistics"
          - "CEFR"
          - "Jupyter"
        links:
          - icon: fab fa-github
            url: https://github.com/Isabell-Furkert-129/german_songs_CEFR_analysis

      - title: "Register-Sensitive Machine Translation with LLMs"
        content: NLP course project investigating how LLMs (GPT-4o, DeepSeek, Gemma 3) handle formality variation in English-German and English-Slovene translation. Compared four prompting strategies and evaluated output with BLEU scores.
        image: /images/projects/profile2.jpg
        featured:
          name: GitHub
          link: https://github.com/Isabell-Furkert-129/ul-fri-nlp-course-project-2024-2025-the-parse-force
        badges:
          - "NLP"
          - "LLMs"
          - "Machine Translation"
          - "Python"
        links:
          - icon: fab fa-github
            url: https://github.com/Isabell-Furkert-129/ul-fri-nlp-course-project-2024-2025-the-parse-force

      - title: "ParlaCAPI Testing"
        content: API testing and validation for ParlaCAPI, a parliamentary corpus API. Identified data quality issues, documented pagination behaviour, and migrated tests to pytest.
        image: /images/projects/converter.jpg
        featured:
